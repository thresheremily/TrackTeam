<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#c96a1f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TrackTeam Demo" />
  <title>TrackTeam — Portfolio Demo</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="manifest" href="../manifest.json" />
  <link rel="apple-touch-icon" href="../icons/icon-192x192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Rubik:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{width:100%;height:100%;overflow-x:hidden}
    body{font-family:'Rubik','Inter',system-ui,-apple-system,sans-serif;background:#f5f6f8;color:#1a1e26;-webkit-font-smoothing:antialiased;overscroll-behavior:none}
    #msg{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f5f6f8}
    #msg h1{font-family:'Montserrat',sans-serif;font-size:24px;font-weight:700;color:#c96a1f;letter-spacing:.04em;text-transform:uppercase}
    #msg p{font-size:13px;color:#8c929e;margin-top:8px;max-width:320px;word-break:break-word;text-align:center;padding:0 20px}
    #demo-banner{
      position:fixed;top:0;left:0;right:0;z-index:9999;
      background:#1a1e26;color:#fff;
      font-family:'Rubik',sans-serif;font-size:12px;
      padding:8px 16px;
      display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;
    }
    #demo-banner strong{color:#c96a1f;}
    #demo-banner .cred{
      background:rgba(255,255,255,0.1);border-radius:4px;
      padding:2px 8px;font-family:monospace;font-size:11px;letter-spacing:0.03em;
    }
    #root{padding-top:36px;}
  </style>
</head>
<body>
  <div id="demo-banner">
    ⚡ <strong>Portfolio Demo</strong> — Sample data only, no real athletes
  </div>
  <div id="msg"><h1>TrackTeam</h1><p id="status">Loading...</p></div>
  <div id="root"></div>

  <script>
    if('serviceWorker' in navigator){
      navigator.serviceWorker.getRegistrations().then(function(r){r.forEach(function(s){s.unregister()})});
      caches.keys().then(function(k){k.forEach(function(n){caches.delete(n)})});
    }
    function showErr(s){document.getElementById('msg').innerHTML='<h1 style="color:#c53030">Error</h1><p style="color:#5c6370;margin-top:12px;max-width:340px;word-break:break-all;padding:0 20px">'+s+'</p>';}
    function setStatus(s){var el=document.getElementById('status');if(el)el.textContent=s;}
    window.onerror=function(m,u,l){showErr(m+' (line '+l+')');};
  </script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    // ── Demo Firebase project config — paste your trackteam-demo values here ──
    firebase.initializeApp({
      apiKey: "AIzaSyDceFEVTxezlGSiNih7PzxWKEMm7P8FNHU",
      authDomain: "trackteam-demo.firebaseapp.com",
      projectId: "trackteam-demo",
      storageBucket: "trackteam-demo.firebasestorage.app",
      messagingSenderId: "765473897796",
      appId: "1:765473897796:web:2e3f3148b863155ea2ab11"
    });
    // ─────────────────────────────────────────────────────────────────────────
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script type="module">
    try {
      setStatus('Loading compiler...');
      var esbuild = await import('https://cdn.jsdelivr.net/npm/esbuild-wasm@0.24.2/esm/browser.min.js');
      await esbuild.initialize({
        wasmURL: 'https://cdn.jsdelivr.net/npm/esbuild-wasm@0.24.2/esbuild.wasm'
      });

      setStatus('Loading app...');
      var r = await fetch('../app.js?v=' + Date.now());
      if (!r.ok) { showErr('Fetch failed: ' + r.status); throw new Error('stop'); }
      var jsx = await r.text();

      setStatus('Compiling...');
      var result = await esbuild.transform(jsx, {
        loader: 'jsx',
        jsx: 'transform',
        jsxFactory: 'React.createElement',
        jsxFragment: 'React.Fragment',
        target: 'es2015'
      });

      setStatus('Starting...');
      var s = document.createElement('script');
      s.textContent = result.code;
      document.body.appendChild(s);
      var m = document.getElementById('msg');
      if (m) { m.style.opacity = '0'; setTimeout(function(){ m.remove(); }, 500); }
    } catch(e) {
      if (e.message !== 'stop') showErr(e.message ? e.message.substring(0, 300) : String(e));
    }
  </script>

  <script>
    // ── Demo auto-login ───────────────────────────────────────────────────────
    // Watches for the React login form, injects a one-click "Enter Demo" button,
    // and pre-fills credentials using React's internal event system.
    const DEMO_EMAIL    = 'demo@trackteam.app';
    const DEMO_PASSWORD = 'TrackDemo2026!';

    function setReactInputValue(el, value) {
      // React tracks input values via its own internal fiber — use the
      // native input value setter so onChange fires correctly
      const nativeInputValueSetter = Object.getOwnPropertyDescriptor(
        window.HTMLInputElement.prototype, 'value'
      ).set;
      nativeInputValueSetter.call(el, value);
      el.dispatchEvent(new Event('input', { bubbles: true }));
      el.dispatchEvent(new Event('change', { bubbles: true }));
    }

    function injectDemoButton() {
      // Already injected?
      if (document.getElementById('demo-enter-btn')) return;

      // Find the email input — that's our signal the auth form is rendered
      const emailInput = document.querySelector('input[type="email"]');
      if (!emailInput) return;

      const passwordInput = document.querySelector('input[type="password"]');
      if (!passwordInput) return;

      // Pre-fill both fields
      setReactInputValue(emailInput, DEMO_EMAIL);
      setReactInputValue(passwordInput, DEMO_PASSWORD);

      // Find the card the form lives in and prepend the button above it
      const card = emailInput.closest('div[style]');
      const container = card ? card.parentElement : emailInput.parentElement;
      if (!container) return;

      // Build the button
      const wrapper = document.createElement('div');
      wrapper.style.cssText = [
        'margin-bottom:16px',
        'text-align:center',
      ].join(';');

      const btn = document.createElement('button');
      btn.id = 'demo-enter-btn';
      btn.textContent = 'Click to Explore Demo →';
      btn.style.cssText = [
        'width:100%',
        'padding:16px 20px',
        'background:#c96a1f',
        'color:#fff',
        'border:none',
        'border-radius:8px',
        'font-size:16px',
        'font-weight:700',
        'cursor:pointer',
        'letter-spacing:0.03em',
        'font-family:Montserrat,Rubik,sans-serif',
        'text-transform:uppercase',
        'box-shadow:0 2px 12px rgba(201,106,31,0.35)',
      ].join(';');

      const note = document.createElement('p');
      note.textContent = 'Portfolio demo — pre-loaded with sample data';
      note.style.cssText = [
        'margin-top:8px',
        'font-size:12px',
        'color:#8c929e',
        'font-family:Rubik,sans-serif',
      ].join(';');

      btn.onclick = function() {
        btn.textContent = 'Signing in...';
        btn.disabled = true;
        // Re-fill in case React cleared the fields, then click Sign In
        setReactInputValue(emailInput, DEMO_EMAIL);
        setReactInputValue(passwordInput, DEMO_PASSWORD);
        setTimeout(function() {
          // Find and click the Sign In button
          const signInBtn = Array.from(document.querySelectorAll('button'))
            .find(b => b.textContent.trim() === 'Sign In' && b !== btn);
          if (signInBtn) {
            signInBtn.click();
          } else {
            // Fallback: trigger Enter on password field
            passwordInput.dispatchEvent(new KeyboardEvent('keydown', {key:'Enter',bubbles:true}));
          }
        }, 80);
      };

      wrapper.appendChild(btn);
      wrapper.appendChild(note);
      container.insertBefore(wrapper, container.firstChild);
    }

    // Poll until the form appears (React renders asynchronously)
    const observer = new MutationObserver(function() {
      injectDemoButton();
    });
    observer.observe(document.body, { childList: true, subtree: true });
    // Also try immediately in case it's already rendered
    setTimeout(injectDemoButton, 500);
    // ─────────────────────────────────────────────────────────────────────────
  </script>
</body>
</html>
